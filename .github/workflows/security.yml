# Archivo: .github/workflows/security.yml
# Lab DevSecOps — Arquitectura de Sistemas de Seguridad CUGDL — Semana 9
#
# INSTRUCCIONES: Completa los bloques marcados con TODO.
# No modifiques nada fuera de esos bloques a menos que la guía lo indique.
# Cuando termines, haz commit y revisa la pestaña Actions en GitHub.
#
# NOTA SOBRE RUTAS: el runner descarga el repositorio completo en su raíz.
# La aplicación del lab está en:
#   Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/
# Todas las rutas relativas en este archivo parten desde ahí.

name: Pipeline de Seguridad DevSecOps

# ─── DISPARADORES ────────────────────────────────────────────────────────────
# Este bloque ya está completo. Define cuándo se ejecuta el pipeline.
#
# workflow_dispatch → permite correr el pipeline manualmente desde la
#   pestaña Actions sin necesidad de hacer un nuevo commit.
#
# ¿Por qué se incluye pull_request y no solo push?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # ejecución manual desde la pestaña Actions

# ─── TRABAJOS (JOBS) ─────────────────────────────────────────────────────────
# Cada job es una etapa independiente del pipeline.
# Los jobs corren en paralelo por defecto, salvo que uses "needs:".

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 1 — SAST (Static Application Security Testing)
  # Herramienta: Semgrep — analiza el código fuente en busca de patrones
  # vulnerables sin ejecutar la aplicación.
  #
  # continue-on-error: true → el job se marca como fallido (rojo) si
  #   Semgrep detecta vulnerabilidades, pero NO bloquea las etapas
  #   siguientes. Esto refleja el modelo "informar sin bloquear" común
  #   en pipelines de seguridad que priorizan visibilidad sobre el bloqueo.
  #   En un pipeline de producción más estricto se quitaría esta opción.
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true   # falla visible pero no bloquea tests
    timeout-minutes: 10

    steps:
      # Paso 1: descargar el código del repositorio al runner.
      # Esta action es estándar en casi todo workflow de GitHub Actions.
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: instalar Semgrep en el runner.
      # Semgrep es un paquete de Python, se instala con pip.
      - name: Instalar Semgrep
        run: pip install semgrep

      # TODO ▼ ─────────────────────────────────────────────────────────────
      # Paso 3: ejecutar el análisis de Semgrep.
      #
      # Comando base:  semgrep --config <ruleset> <ruta-a-analizar>
      #
      # Rulesets requeridos (sepáralos con espacios usando --config cada vez):
      #   p/python          → reglas generales para Python
      #   p/owasp-top-ten   → vulnerabilidades del OWASP Top 10
      #   p/secrets         → credenciales y secretos en el código
      #   p/sql-injection   → inyección SQL
      #
      # Ruta a analizar:
      #   Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/
      #
      # Agrega --error para que el job falle si Semgrep encuentra algo.
      # ¿Qué implicación tiene eso en un pipeline de CI/CD real?
      - name: Ejecutar análisis SAST
        run: |
          semgrep --config p/python \
          --config p/owasp-top-ten \
          --config p/secrets \
          --config p/sql-injection \
          --error \
          --json \
          --output=semgrep-results.json \
          Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/ 
          
          semgrep --config p/python \
          --config p/owasp-top-ten \
          --config p/secrets \
          --config p/sql-injection \
          Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/

      - name: Guardar resultados SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 2 — SCA (Software Composition Analysis)
  # Herramienta: pip-audit — audita las dependencias del proyecto buscando
  # CVEs conocidos en los paquetes de requirements.txt.
  # ═══════════════════════════════════════════════════════════════════════════
  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: configurar la versión de Python en el runner.
      # La action "setup-python" hace disponible el comando python y pip.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # TODO ▼ ─────────────────────────────────────────────────────────────
      # Paso 3: instalar pip-audit y ejecutar la auditoría.
      #
      # pip-audit se instala con pip igual que cualquier paquete.
      # Para auditar un archivo de dependencias específico:
      #   pip-audit -r <ruta-al-requirements.txt>
      #
      # Recuerda: el requirements.txt está en:
      #   Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
      #
      # Pregunta: ¿qué CVEs aparecen al correr la auditoría?
      #           ¿Cuáles de los paquetes tienen versiones seguras disponibles?
      - name: Instalar y ejecutar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt \
          --format=json \
          --output=audit-report.json || true
          echo "--- Reporte de CVEs ---"
          pip-audit -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt

      - name: Guardar reporte de auditoria
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: audit-report.json

  # ═══════════════════════════════════════════════════════════════════════════
  # ETAPA 3 — TESTS
  # Herramienta: pytest — ejecuta las pruebas unitarias del proyecto.
  #
  # needs: [sast, sca] → esta etapa espera a que SAST y SCA terminen.
  # Como SAST tiene continue-on-error: true, los tests corren aunque
  # Semgrep haya encontrado vulnerabilidades. Esto permite ver en el
  # mismo pipeline: qué falló en seguridad Y si los tests pasan.
  # ═══════════════════════════════════════════════════════════════════════════
  tests:
    name: Tests - pytest
    runs-on: ubuntu-latest
    needs: [ sast, sca ]   # espera a que SAST y SCA terminen primero
    timeout-minutes: 10

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # TODO ▼ ─────────────────────────────────────────────────────────────
      # Paso 3: instalar las dependencias e instalar pytest.
      #
      # Necesitas dos comandos:
      #   a) instalar los paquetes desde:
      #      Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
      #   b) instalar pytest (si no viene en requirements.txt)
      #
      # Luego ejecuta pytest indicando la carpeta de tests:
      #   Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/
      # Agrega -v para ver el detalle de cada test.
      #
      # Pregunta: ¿qué pasa si un test falla? ¿Se bloquea el merge del PR?
      - name: Instalar dependencias
        run: |
          pip install -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: |
          pytest Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v
